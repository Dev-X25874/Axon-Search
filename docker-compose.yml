version: "3.9"

services:
  axon-search:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: axon-search:latest
    container_name: axon-search
    ports:
      - "8000:8000"
    volumes:
      # Persist index across container restarts
      - ./data:/app/data
      # HuggingFace model cache — avoids re-downloading on every rebuild
      - hf-cache:/home/axon/.cache/huggingface
    environment:
      - INDEX_DIR=/app/data/index
      - EMBED_MODEL=${EMBED_MODEL:-BAAI/bge-large-en-v1.5}
      - RERANK_MODEL=${RERANK_MODEL:-cross-encoder/ms-marco-MiniLM-L-12-v2}
      - EMBED_DEVICE=${EMBED_DEVICE:-cpu}
      - RERANK_DEVICE=${RERANK_DEVICE:-cpu}
      - QUALITY_THRESHOLD=${QUALITY_THRESHOLD:-0.35}
      - DEDUP_THRESHOLD=${DEDUP_THRESHOLD:-0.8}
      - NEURAL_FILTER_THRESHOLD=${NEURAL_FILTER_THRESHOLD:-0.25}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s    # models take time to load

volumes:
  hf-cache:
